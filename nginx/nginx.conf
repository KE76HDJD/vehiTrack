worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;

    upstream auth_service { server auth:8000; }
    upstream identity_service { server identity:8000; }
    upstream vehicle_service { server vehicle:8000; }
    upstream session_service { server session:8000; }
    upstream ocr_service { server ocr:8000; }
    upstream analytics_service { server analytics:8000; }
    upstream dashboard_service { server dashboard:8000; }

    server {
        listen 80;

        # Auth & Identity
        location /api/v1/auth { proxy_pass http://auth_service; }
        location /api/v1/identity { proxy_pass http://identity_service; }
        location /api/v1/employees { proxy_pass http://identity_service; }

        # Vehicle Management
        location /api/v1/vehicles { proxy_pass http://vehicle_service; }

        # Session Management
        location /api/v1/sessions { proxy_pass http://session_service; }

        # Analytics
        location /api/v1/analytics { proxy_pass http://analytics_service; }
        
        # OCR
        location /api/v1/ocr { proxy_pass http://ocr_service; }

        # Dashboard
        location /api/v1/dashboard { proxy_pass http://dashboard_service; }
        
        # WebSockets
        location /ws {
            proxy_pass http://dashboard_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}

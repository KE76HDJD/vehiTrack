worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    upstream auth_service       { server auth:8000; }
    upstream identity_service   { server identity:8000; }
    upstream vehicle_service    { server vehicle:8000; }
    upstream access_control_svc { server access_control:8000; }
    upstream session_service    { server session:8000; }
    upstream frontend_service   { server frontend:80; }

    server {
        listen 80;
        server_name localhost;

        location /health {
            return 200 '{"status":"ok","mode":"dev"}';
            add_header Content-Type application/json;
        }

        location /api/v1/auth/ {
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/identity/ {
            proxy_pass http://identity_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/vehicles/ {
            proxy_pass http://vehicle_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/access/ {
            proxy_pass http://access_control_svc/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/sessions/ {
            proxy_pass http://session_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/analytics/ {
            return 503 '{"error":"disabled_in_dev"}';
            add_header Content-Type application/json;
        }

        location /api/v1/reports/ {
            return 503 '{"error":"disabled_in_dev"}';
            add_header Content-Type application/json;
        }

        location /api/v1/ocr/ {
            return 503 '{"error":"disabled_in_dev"}';
            add_header Content-Type application/json;
        }

        location / {
            proxy_pass http://frontend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
